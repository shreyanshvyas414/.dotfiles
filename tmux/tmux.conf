# ── PREFIX ─────────────────────────────────────────
# set prefix to alt+space
unbind C-b
set -g prefix M-Space
bind M-Space send-prefix

# ── TERMINAL ───────────────────────────────────────
# reduce key delay
set -sg escape-time 0

# enable true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"

# set default shell
set -g default-shell /bin/zsh

# increase scrollback
set -g history-limit 100000

# ── INDEXING ───────────────────────────────────────
# start windows at 1
set -g base-index 1
setw -g pane-base-index 1

# renumber windows automatically
set -g renumber-windows on

# ── MOUSE ──────────────────────────────────────────
# enable mouse support
set -g mouse on

# ── WINDOWS ────────────────────────────────────────
# create new window in current path
bind t new-window -c "#{pane_current_path}"

# kill current window
bind x kill-window

# rename window
bind r command-prompt -I "#W" "rename-window '%%'"

# ── SPLITS ─────────────────────────────────────────
# horizontal split
bind Right split-window -h -c "#{pane_current_path}" \; select-pane -R

# horizontal reverse split
bind Left split-window -hb -c "#{pane_current_path}" \; select-pane -L

# vertical split
bind Down split-window -v -c "#{pane_current_path}" \; select-pane -D

# vertical reverse split
bind Up split-window -vb -c "#{pane_current_path}" \; select-pane -U

# remove default splits
unbind '"'
unbind %

# ── NAVIGATION ─────────────────────────────────────
# prefix pane navigation
bind C-Left select-pane -L
bind C-Right select-pane -R
bind C-Up select-pane -U
bind C-Down select-pane -D

# alt pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── RESIZE ─────────────────────────────────────────
# prefix resize
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# alt resize
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# ── COPY MODE ──────────────────────────────────────
# use vim keys
setw -g mode-keys vi

# enter copy mode
bind Escape copy-mode

# begin selection
bind -T copy-mode-vi v send -X begin-selection

# rectangle selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# copy to clipboard
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# paste buffer
bind p paste-buffer

# ── STATUS BAR ─────────────────────────────────────
# rounded segments for active window
HALF_ROUND_OPEN="#(printf '\uE0B6')"
HALF_ROUND_CLOSE="#(printf '\uE0B4')"

# enable status
set -g status on

# place at top
set -g status-position top

# refresh interval
set -g status-interval 5

# transparent background
set -g status-style "bg=default"

# set left status (flat)
set -g status-left "#[fg=yellow,bold]󰴈 #S "

# center window list
set -g status-justify absolute-centre

# active window pill
set -g window-status-current-format "#[fg=yellow]${HALF_ROUND_OPEN}#[fg=black,bg=yellow,bold]#I:#W#[fg=yellow,bg=default]${HALF_ROUND_CLOSE}"

# remove right status
set -g status-right ""

# ── BORDERS ────────────────────────────────────────
# inactive pane border
set -g pane-border-style fg=colour238

# active pane border
set -g pane-active-border-style fg=yellow

# ── FEATURES ───────────────────────────────────────
# disable auto rename
set -g allow-rename off

# enable focus events
set -g focus-events on

# monitor activity
setw -g monitor-activity on

# disable activity visual
set -g visual-activity off

# aggressive resize
setw -g aggressive-resize on
